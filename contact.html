  <div class="sticker">
    <div class="stickerOne">
      <img src="images/pokemonTwo.png" alt="pokemon one" />
    </div>
    <div class="stickerTwo">
      <img src="images/pokemonOne.png" alt="pokemon two" />

    <div class="stickerThree">
      <img src="images/pokemonThree.png" alt="pokemon three" />
    </div>
  </div>
  <div class="contactBox">
    <form>
      <label for="name">Name:</label>
      <input
        type="text"
        id="name"
        name="name"
        style="width: 50%; display: block"
      />
      <label for="email">Email:</label>
      <input
        type="email"
        id="email"
        name="email"
        style="width: 50%; display: block"
      />
      <label for="message">Message:</label>
      <textarea
        id="message"
        name="message"
        rows="3"
        style="width: 50%; display: block"
      ></textarea>

      <button type="submit">Submit</button>
    </form>
  </div>
